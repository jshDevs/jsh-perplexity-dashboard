# JSH Dashboard v2 — production offline-first intranet stack
# Block B10: docker-compose.prod.yml
version: '3.9'

x-health-defaults: &health_defaults
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  postgres:
    image: postgres:16-alpine
    container_name: jsh_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-jsh_dashboard}
      POSTGRES_USER: ${DB_USERNAME:-jsh}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jsh} -d ${DB_DATABASE:-jsh_dashboard}"]
      <<: *health_defaults
    networks:
      - jsh_backend_net

  redis:
    image: redis:7-alpine
    container_name: jsh_redis_prod
    restart: unless-stopped
    command: >
      sh -c 'redis-server
      --appendonly yes
      --requirepass "$$(cat /run/secrets/redis_password)"
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru'
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep PONG"]
      <<: *health_defaults
    networks:
      - jsh_backend_net

  duckdb:
    image: ghcr.io/duckdb/duckdb:latest
    container_name: jsh_duckdb_prod
    restart: unless-stopped
    command: ["sleep", "infinity"]
    volumes:
      - duckdb_data:/data
      - backend_storage:/storage
    healthcheck:
      test: ["CMD-SHELL", "test -d /data && test -d /storage"]
      <<: *health_defaults
    networks:
      - jsh_backend_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: jsh_backend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_ENV: production
      PORT: 8000
      APP_URL: ${APP_URL:-http://localhost}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-jsh_dashboard}
      DB_USERNAME: ${DB_USERNAME:-jsh}
      DB_PASSWORD_FILE: /run/secrets/db_password
      DASHBOARDS_DIR: /app/dashboards
      UPLOAD_DIR: /app/storage/uploads
      DUCKDB_DATABASE: /data/jsh-dashboard.duckdb
      DUCKDB_MAX_MEMORY: ${DUCKDB_MAX_MEMORY:-2GB}
      DUCKDB_THREADS: ${DUCKDB_THREADS:-4}
      OFFLINE_MODE: "true"
      DISABLE_TELEMETRY: "true"
    secrets:
      - db_password
      - redis_password
    volumes:
      - backend_storage:/app/storage
      - backend_dashboards:/app/dashboards
      - duckdb_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      duckdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/up >/dev/null 2>&1 || exit 1"]
      <<: *health_defaults
    networks:
      - jsh_backend_net
      - jsh_edge_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jsh_frontend_prod
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
      VITE_OFFLINE_MODE: "true"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      <<: *health_defaults
    networks:
      - jsh_edge_net

  nginx:
    image: nginx:1.27-alpine
    container_name: jsh_nginx_prod
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./ops/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
      - backend_storage:/var/www/storage:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      <<: *health_defaults
    networks:
      - jsh_edge_net

volumes:
  postgres_data:
  redis_data:
  duckdb_data:
  backend_storage:
  backend_dashboards:

networks:
  jsh_backend_net:
    driver: bridge
    internal: true
  jsh_edge_net:
    driver: bridge

secrets:
  db_password:
    file: ./ops/secrets/db_password.txt
  redis_password:
    file: ./ops/secrets/redis_password.txt
