# nginx.prod.conf — reverse proxy para JSH Dashboard (intranet LAN)
# Características: gzip, cache estático, security headers, proxy backend API

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main buffer=16k flush=5s;

  # ── Performance ─────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;   # ocultar versión Nginx

  # ── Gzip ─────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             application/wasm font/woff2;

  # ── Rate limiting (protección intranet) ──────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

  # ── Upload size (sincronizar con MAX_UPLOAD_BYTES) ──────────────────
  client_max_body_size 55m;

  upstream backend {
    server backend:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options           SAMEORIGIN      always;
    add_header X-Content-Type-Options    nosniff         always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           strict-origin   always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:" always;

    # ── Health check (usado por Docker + Nginx healthcheck) ──────────
    location = /health {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # ── API proxy ──────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;
    }

    # ── Upload endpoint con rate limit más estricto ────────────────
    location /api/v1/ingest {
      limit_req zone=upload burst=5 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_read_timeout 300s;
      client_max_body_size 55m;
    }

    # ── WebSocket (Laravel Reverb / futuro) ─────────────────────
    location /ws {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host $host;
      proxy_read_timeout 3600s;
    }

    # ── Frontend estático (SPA) ────────────────────────────────
    location / {
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;

      # Cache largo para assets con hash en nombre
      location ~* \.(js|css|woff2|png|svg|ico|wasm)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
      }
    }
  }

  # ── HTTPS (descomentar en producción con certs) ─────────────────
  # server {
  #   listen 443 ssl http2;
  #   ssl_certificate     /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ... (redirect http -> https arriba)
  # }
}
