# JSH Dashboard v2 — 100% JavaScript stack (no PHP)
version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jsh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_DATABASE:-jsh_dashboard}
      POSTGRES_USER:     ${DB_USERNAME:-jsh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jsh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jsh_net

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jsh_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jsh_net

  # ── Hono API (Node.js 22) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: jsh_backend
    restart: unless-stopped
    environment:
      NODE_ENV:         ${NODE_ENV:-production}
      PORT:             8000
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_DATABASE:      ${DB_DATABASE:-jsh_dashboard}
      DB_USERNAME:      ${DB_USERNAME:-jsh}
      DB_PASSWORD:      ${DB_PASSWORD:-secret}
      DUCKDB_MAX_MEMORY: ${DUCKDB_MAX_MEMORY:-1GB}
      DUCKDB_THREADS:   ${DUCKDB_THREADS:-4}
      DASHBOARDS_DIR:   /app/dashboards
      UPLOAD_DIR:       /app/storage/uploads
    volumes:
      - backend_storage:/app/storage
      - backend_dashboards:/app/dashboards
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - jsh_net

  # ── React Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jsh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - jsh_net

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: jsh_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - jsh_net

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  backend_dashboards:

networks:
  jsh_net:
    driver: bridge
