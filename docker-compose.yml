version: "3.9"

networks:
  frontend:
  backend:
  db:

volumes:
  postgres_data:
  redis_data:
  duckdb_data:

services:
  # ─── Nginx (reverse proxy) ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [frontend, backend]
    depends_on: [app]
    restart: unless-stopped

  # ─── Laravel App ──────────────────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - duckdb_data:/var/www/html/storage/data
    environment:
      APP_ENV: local
    env_file: .env
    networks: [backend, db]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── Laravel Reverb (WebSocket) ───────────────────────────────────────
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    volumes:
      - ./backend:/var/www/html
    env_file: .env
    ports:
      - "8080:8080"
    networks: [backend, db]
    depends_on: [app]
    restart: unless-stopped

  # ─── Queue Worker ────────────────────────────────────────────────────
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=60
    volumes:
      - ./backend:/var/www/html
      - duckdb_data:/var/www/html/storage/data
    env_file: .env
    networks: [backend, db]
    depends_on: [app]
    restart: unless-stopped

  # ─── React Frontend (dev) ─────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks: [frontend]
    environment:
      VITE_API_URL: http://localhost:8000
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: dashboard_db
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: secret
    networks: [db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d dashboard_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass secret --save 60 1
    volumes:
      - redis_data:/data
    networks: [db]
    restart: unless-stopped
