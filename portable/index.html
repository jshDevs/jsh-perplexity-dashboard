<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSH Dashboard — Portable</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="dark">

  <!-- ═══════════════════════════════════════════
       SIDEBAR
  ════════════════════════════════════════════ -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="logo">⬡ JSH</span>
      <span class="version">Local v1</span>
    </div>

    <section class="sidebar-section">
      <h3>Cargar datos</h3>
      <label class="file-drop" id="dropZone">
        <input type="file" id="fileInput" accept=".csv,.json" hidden />
        <span id="dropLabel">📂 CSV · JSON</span>
      </label>
      <p id="ingestStatus" class="status-msg"></p>
    </section>

    <section class="sidebar-section" id="schemaSection" hidden>
      <h3>Schema inferido</h3>
      <ul id="schemaList" class="schema-list"></ul>
    </section>

    <section class="sidebar-section" id="dashboardsSection">
      <h3>Dashboards</h3>
      <ul id="dashboardList" class="dash-list"></ul>
      <button id="newDashBtn" class="btn-sm">+ Nuevo</button>
    </section>

    <div class="sidebar-footer">
      <button id="themeToggle" class="btn-icon" title="Alternar tema">🌙</button>
      <button id="clearStorageBtn" class="btn-icon btn-danger" title="Limpiar datos locales">🗑</button>
    </div>
  </aside>

  <!-- ═══════════════════════════════════════════
       MAIN
  ════════════════════════════════════════════ -->
  <main id="main">
    <header id="topbar">
      <button id="sidebarToggle" class="btn-icon">☰</button>
      <h1 id="dashTitle" class="dash-title">Sin dashboard</h1>
      <div class="topbar-actions">
        <button id="exportCsvBtn" class="btn-sm" hidden>⬇ CSV</button>
        <button id="exportPngBtn" class="btn-sm" hidden>⬇ PNG</button>
      </div>
    </header>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <p>📂 Carga un archivo CSV o JSON para comenzar</p>
    </div>

    <!-- Grid de charts -->
    <div id="chartGrid" class="chart-grid" hidden></div>

    <!-- Tabla de datos -->
    <div id="tableSection" class="table-section" hidden>
      <div class="table-toolbar">
        <input type="text" id="tableSearch" placeholder="Buscar…" class="search-input" />
        <span id="rowCount" class="row-count"></span>
      </div>
      <div class="table-wrapper">
        <table id="dataTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="table-pagination">
        <button id="pagePrev" class="btn-sm">‹</button>
        <span id="pageInfo"></span>
        <button id="pageNext" class="btn-sm">›</button>
      </div>
    </div>
  </main>

  <!-- Vendor: ECharts (local) -->
  <script src="assets/vendor/echarts.min.js"></script>

  <!-- Módulos de la app (ES modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
